minimum_cumulusci_version: '3.76.0'
project:
    name: rugbyDay
    package:
        name: rugbyDay
        
        api_version: '58.0'
    git:
        default_branch: 'main'
    source_format: sfdx
    dependencies:
        - github: "https://github.com/SalesforceFoundation/NPSP"
      

tasks:
    run_tests:
        options:
            required_org_code_coverage_percent: 75

orgs:
    scratch:

        dev:
            config_file: orgs/unmanaged.json
        feature:
            config_file: orgs/unmanaged.json
            days: 7
        qa:
            config_file: orgs/qa.json

